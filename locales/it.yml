  why_us:
    title: "Progettato per aziende moderne."
    subtitle: "Stabile, ben progettato e tutto in uno. Sostituisci strumenti di prenotazione obsoleti: ottieni un sito web premium con prenotazioni e pagamenti integrati."
    card_parity:
      title: "La stessa potenza dei grandi"
      description: "Combiniamo ciò che Fresha e altri offrono: prenotazioni in tempo reale, promemoria, pagamenti, gestione team. Ottieni le funzionalità di cui hai bisogno senza complessità o costi elevati."
    card_landing:
      title: "La tua pagina di prenotazione è il tuo sito"
      description: "Chi altro ti dà una landing page completa che funge da sito web? Con BookrHub, la tua pagina non è solo un modulo: è una pagina con il tuo brand, i tuoi servizi e il tuo dominio. Un solo link per tutto."
    card_growth:
      title: "Stiamo appena iniziando"
      description: "Questa è la nostra base. Tutto ciò che aggiungiamo—nuove funzionalità, integrazioni, strumenti—fa crescere anche la tua piattaforma. Non stai acquistando un prodotto chiuso; stai salendo su una piattaforma che crescerà molto con te."
    card_payments:
      title: "Zero commissioni. Il tuo metodo di pagamento. I soldi vanno a te."
      description: "Non prendiamo percentuali né commissioni sulle tue vendite. Colleghi il tuo metodo di pagamento—supportiamo diverse integrazioni. I soldi vanno direttamente a te. Configura quello che preferisci e tieni ogni euro che guadagni."
    card_underdog:
      title: "Progettato per aziende reali"
      description: "Non siamo un gigante. Lo costruiamo per saloni, barbieri, consulenti e piccoli team che vogliono qualcosa che funzioni e continui a migliorare. I tuoi feedback definiscono cosa costruiamo dopo."

