  faq:
    title: "Domande frequenti"
    subtitle: "Tutto ciò che devi sapere su BookrHub"
    question1: "Come funziona il piano gratuito?"
    answer1: "Il nostro piano Indipendente gratuito è completamente gratuito per sempre—senza carta di credito. Ottieni fino a 150 prenotazioni al mese, promemoria via email e una pagina di prenotazione sul nostro subdomain. È perfetto per professionisti indipendenti che iniziano."
    question2: "Posso cancellare il mio abbonamento in qualsiasi momento?"
    answer2: "Sì! Puoi cancellare il tuo abbonamento in qualsiasi momento senza domande. Nessun contratto a lungo termine né penali di cancellazione. Continuarai ad avere accesso fino alla fine del tuo periodo di fatturazione."
    question3: "Offrite soluzioni personalizzate per team più grandi?"
    answer3: "Assolutamente! Il nostro piano Business supporta membri dello staff illimitati. Per aziende con esigenze specifiche, contattaci a admin@bookrhub.com e creeremo una soluzione personalizzata per te."
    question4: "Prendete una commissione o percentuale sulle mie vendite?"
    answer4: "No. Non prendiamo alcuna commissione o percentuale sulle tue vendite. Colleghi il tuo metodo di pagamento—supportiamo diverse integrazioni. I soldi vanno direttamente a te. Configura quello che preferisci e tieni ogni euro che guadagni."
    question5: "Quanto tempo richiede la configurazione?"
    answer5: "La maggior parte delle aziende è operativa in meno di 5 minuti! Crea semplicemente un account, aggiungi i tuoi servizi e disponibilità e condividi il tuo link di prenotazione. È così semplice."
    question6: "Cos'è un sistema di prenotazione e perché ne ho bisogno?"
    answer6: "Un sistema di prenotazione è un software che aiuta le aziende a gestire appuntamenti, orari e prenotazioni dei clienti online. BookrHub è un sistema di prenotazione completo che automatizza il tuo calendario, riduce le assenze con promemoria e ti aiuta a far crescere la tua attività. Il nostro piano gratuito è ideale per iniziare senza carta di credito."
    question7: "BookrHub è una buona alternativa a Fresha?"
    answer7: "Sì. BookrHub è un sistema di prenotazione e appuntamenti semplice che fa ciò di cui hai bisogno senza complessità. Se cerchi un'alternativa a Fresha con piano gratuito, prenotazioni in tempo reale e promemoria, BookrHub è progettato per piccoli team e professionisti indipendenti. Senza carta di credito per iniziare."
    question8: "Ottengo un sito web o solo un modulo di prenotazione?"
    answer8: "Ottieni una landing page completa che funge da sito web. La tua pagina BookrHub ha il tuo brand, i tuoi servizi, la tua disponibilità—non è solo un modulo. Molti concorrenti ti danno un modulo da integrare altrove; noi ti diamo una pagina pronta da condividere che sembra la tua attività. Nei piani a pagamento puoi usare il tuo dominio. Un solo link per tutto."

