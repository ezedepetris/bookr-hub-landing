  faq:
    title: "Частые вопросы"
    subtitle: "Всё, что вам нужно знать о BookrHub"
    question1: "Что такое система записи и зачем она мне нужна?"
    answer1: "Система записи — это программа, которая помогает бизнесу управлять записями, расписанием и бронированием клиентов онлайн. BookrHub — это полноценная система записи, которая автоматизирует ваше расписание, сокращает неявки с помощью напоминаний и помогает расти вашему бизнесу. Наш бесплатный план идеален для старта без кредитной карты."
    question2: "Как работает бесплатный план?"
    answer2: "Наш бесплатный план Независимый полностью бесплатен навсегда — без кредитной карты. Вы получаете до 150 записей в месяц, email-напоминания и страницу записи на нашем поддомене. Идеально для начинающих фрилансеров."
    question3: "Могу ли я отменить подписку в любой момент?"
    answer3: "Да! Вы можете отменить подписку в любой момент без вопросов. Никаких долгосрочных контрактов или штрафов за отмену. У вас останется доступ до конца оплаченного периода."
    question4: "Предлагаете ли вы кастомные решения для больших команд?"
    answer4: "Конечно! Наш план Бизнес поддерживает безлимитное количество сотрудников. Для компаний со специфическими потребностями пишите на admin@bookrhub.com, и мы создадим для вас кастомное решение."
    question5: "Берёте ли вы комиссию или процент с моих продаж?"
    answer5: "Нет. Мы не берём никакой комиссии или процента с ваших продаж. Вы подключаете свой способ оплаты — мы поддерживаем множество интеграций. Деньги идут напрямую вам. Настройте предпочтительный провайдер и сохраните каждую копейку."
    question6: "Как быстро я могу начать?"
    answer6: "Большинство компаний запускаются менее чем за 5 минут! Просто создайте аккаунт, добавьте услуги и доступное время, поделитесь ссылкой для записи. Всё так просто."
    question7: "Является ли BookrHub хорошей альтернативой Fresha, SetMore или GetTimely?"
    answer7: "Да. BookrHub — это простая система записи и бронирования, которая делает то, что вам нужно, без сложностей. Если вы ищете альтернативу Fresha, SetMore или GetTimely с бесплатным планом, записью в реальном времени и напоминаниями, BookrHub создан для малых команд и независимых профессионалов. Без кредитной карты для старта."
    question8: "Я получу сайт или только форму записи?"
    answer8: "Вы получите полноценную лендинг-страницу, которая служит вашим сайтом. Ваша страница BookrHub содержит ваш бренд, ваши услуги, вашу доступность — это не просто скучная форма. Многие конкуренты дают вам форму для встраивания; мы даём вам готовую к распространению страницу, которая выглядит как ваш бизнес. На платных планах вы можете использовать свой домен. Одна ссылка решает всё."

