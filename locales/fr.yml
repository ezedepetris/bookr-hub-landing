    subtitle: "Stable, bien conçu et tout-en-un. Remplacez les outils de réservation obsolètes et les sites faits de rustines : obtenez une web premium avec réservations et paiements intégrés."
    card_parity:
      title: "La même puissance que les grands"
      description: "Nous égalisons ce que Fresha, SetMore et GetTimely offrent : réservations en temps réel, rappels, paiements, gestion d'équipe. Vous avez les fonctions dont vous avez besoin sans remplissage ni prix élevés."
    card_landing:
      title: "Votre page de réservation est votre site web"
      description: "Qui d'autre vous donne une landing page complète qui sert de site web ? Avec BookrHub votre page n'est pas juste un formulaire : c'est une page avec votre marque, vos services et votre domaine. Un seul lien pour tout."
    card_growth:
      title: "Nous venons juste de commencer"
      description: "C'est notre base. Tout ce que nous ajoutons—nouvelles fonctions, intégrations, outils—fait aussi grandir votre plateforme. Vous n'achetez pas un produit fermé ; vous montez sur une plateforme qui va beaucoup grandir avec vous."
    card_payments:
      title: "Zéro commission. Votre méthode de paiement. L'argent va à vous."
      description: "Nous ne prenons pas de pourcentage ni de commission sur vos ventes. Vous connectez votre propre méthode de paiement—nous supportons plusieurs intégrations. L'argent vous arrive directement. Configurez celle que vous préférez et gardez chaque euro que vous gagnez."
    card_underdog:
      title: "Fait pour les vraies entreprises"
      description: "Nous ne sommes pas un géant. Nous l'avons construit pour les salons, barbiers, consultants et petites équipes qui veulent quelque chose qui fonctionne et continue de s'améliorer. Vos commentaires définissent ce que nous construisons ensuite."

