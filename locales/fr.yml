  faq:
    title: "Questions fréquentes"
    subtitle: "Tout ce que vous devez savoir sur BookrHub"
    question1: "Comment fonctionne le plan gratuit ?"
    answer1: "Notre plan Indépendant gratuit est complètement gratuit pour toujours - aucune carte de crédit requise. Vous obtenez jusqu'à 150 réservations par mois, des rappels par email, et une page de réservation sur notre sous-domaine. C'est parfait pour les professionnels indépendants qui commencent."
    question2: "Puis-je annuler mon abonnement à tout moment ?"
    answer2: "Oui ! Vous pouvez annuler votre abonnement à tout moment sans questions. Pas de contrats à long terme ni de frais d'annulation. Vous continuerez à avoir accès jusqu'à la fin de votre période de facturation."
    question3: "Offrez-vous des solutions personnalisées pour les grandes équipes ?"
    answer3: "Absolument ! Notre plan Business prend en charge un nombre illimité de membres du personnel. Pour les entreprises avec des besoins spécifiques, contactez-nous à admin@bookrhub.com et nous créerons une solution personnalisée pour vous."
    question4: "Percevez-vous une commission ou un pourcentage sur mes ventes ?"
    answer4: "Non. Nous ne percevons aucune commission ni pourcentage sur vos ventes. Vous connectez votre propre méthode de paiement—nous prenons en charge plusieurs intégrations. L'argent vous arrive directement. Configurez celle que vous préférez et gardez chaque euro que vous gagnez."
    question5: "Combien de temps faut-il pour le configurer ?"
    answer5: "La plupart des entreprises sont opérationnelles en moins de 5 minutes ! Créez simplement un compte, ajoutez vos services et disponibilités, et partagez votre lien de réservation. C'est aussi simple que ça."
    question6: "Qu'est-ce qu'un système de réservation et pourquoi en ai-je besoin ?"
    answer6: "Un système de réservation est un logiciel qui aide les entreprises à gérer les rendez-vous, les horaires et les réservations de clients en ligne. BookrHub est un système de réservation complet qui automatise votre agenda, réduit les absences avec des rappels et vous aide à développer votre entreprise. Notre plan gratuit est idéal pour commencer sans carte de crédit."
    question7: "BookrHub est-il une bonne alternative à Fresha, SetMore ou Timely ?"
    answer7: "Oui. BookrHub est un système de réservation et de prise de rendez-vous simple qui fait ce dont vous avez besoin sans complications. Si vous cherchez une alternative à Fresha, SetMore ou Timely avec un plan gratuit, des réservations en temps réel et des rappels, BookrHub est conçu pour les petites équipes et les professionnels indépendants. Aucune carte de crédit requise pour commencer."
    question8: "Obtenez-vous un site web ou juste un formulaire de réservation ?"
    answer8: "Vous obtenez une landing complète qui sert de site web. Votre page BookrHub a votre marque, vos services, votre disponibilité—ce n'est pas juste un formulaire. De nombreux concurrents vous donnent un formulaire à intégrer ; nous vous donnons une page prête à partager qui ressemble à votre entreprise. Dans les plans payants, vous pouvez utiliser votre propre domaine. Un seul lien pour tout."

