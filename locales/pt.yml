  faq:
    title: "Perguntas frequentes"
    subtitle: "Tudo o que você precisa saber sobre o BookrHub"
    question1: "Como funciona o plano gratuito?"
    answer1: "Nosso plano Independente gratuito é completamente gratuito para sempre—sem cartão de crédito. Você obtém até 150 agendamentos por mês, lembretes por email e uma página de agendamento em nosso subdomínio. É perfeito para profissionais independentes que estão começando."
    question2: "Posso cancelar minha assinatura a qualquer momento?"
    answer2: "Sim! Você pode cancelar sua assinatura a qualquer momento sem perguntas. Sem contratos de longo prazo ou taxas de cancelamento. Você continuará tendo acesso até o final do seu período de faturamento."
    question3: "Vocês oferecem soluções personalizadas para equipes maiores?"
    answer3: "Com certeza! Nosso plano Business suporta membros de equipe ilimitados. Para empresas com necessidades específicas, entre em contato pelo admin@bookrhub.com e criaremos uma solução personalizada para você."
    question4: "Vocês cobram comissão ou porcentaje das minhas vendas?"
    answer4: "Não. Não cobramos nenhuma comissão ou porcentaje das suas vendas. Você conecta seu próprio método de pagamento—suportamos várias integrações. O dinheiro vai diretamente para você. Configure o que preferir e fique com cada centavo que ganha."
    question5: "Quanto tempo leva para configurar?"
    answer5: "A maioria das empresas está funcionando em menos de 5 minutos! Basta criar uma conta, adicionar seus serviços e disponibilidade e compartilhar seu link de agendamento. É simples assim."
    question6: "O que é um sistema de agendamento e por que preciso de um?"
    answer6: "Um sistema de agendamento é um software que ajuda empresas a gerenciar horários, agendamentos e reservas de clientes online. O BookrHub é um sistema de agendamento completo que automatiza sua agenda, reduz faltosos com lembretes e ajuda você a crescer seu negócio. Nosso plano gratuito é ideal para começar sem cartão de crédito."
    question7: "O BookrHub é uma boa alternativa ao Fresha?"
    answer7: "Sim. O BookrHub é um sistema de agendamento e marcação de horários simples que faz o que você precisa sem complicações. Se você procura uma alternativa ao Fresha com plano gratuito, agendamento em tempo real e lembretes, o BookrHub é feito para pequenas equipes e profissionais independentes. Sem cartão de crédito para começar."
    question8: "Eu ganho um site ou apenas um formulário de agendamento?"
    answer8: "Você ganha uma landing page completa que serve como seu site. Sua página BookrHub tem sua marca, seus serviços, sua disponibilidade—não é apenas um formulário. Muitos concorrentes te dão um formulário para embutir; nós te damos uma página pronta para compartilhar que parece seu negócio. Nos planos pagos, você pode usar seu próprio domínio. Um único link faz tudo."

