    title: "Feito para empresas modernas."
    subtitle: "Estável, bem projetado e completo. Substitua ferramentas de agendamento obsoletas e sites improvisados: obtenha um site premium com agendamento e pagamentos integrados."
    card_parity:
      title: "A mesma potência dos grandes"
      description: "Combinamos o que Fresha e outros oferecem: agendamento em tempo real, lembretes, pagamentos, gestão de equipe. Você tem os recursos que precisa sem a complexidade ou o preço alto."
    card_landing:
      title: "Sua página de agendamento é seu site"
      description: "Quem mais te dá uma landing page completa que serve como seu site? Com o BookrHub, sua página não é só um formulário: é uma página com sua marca, seus serviços e seu domínio. Um único link faz tudo."
    card_growth:
      title: "Estamos apenas começando"
      description: "Esta é nossa base. Tudo o que adicionamos—novos recursos, integrações, ferramentas—também faz sua plataforma crescer. Você não está comprando um produto fechado; está entrando em uma plataforma que vai crescer muito com você."
    card_payments:
      title: "Zero comissão. Seu método de pagamento. O dinheiro vai para você."
      description: "Nãoomos porcentaje nem comissão das suas vendas. Você conecta seu próprio método de pagamento—suportamos várias integrações. O dinheiro vai diretamente para você. Configure o que preferir e fique com cada centavo que ganha."
    card_underdog:
      title: "Feito para empresas reais"
      description: "Não somos um gigante. Construímos isto para salões, barbearias, consultores e pequenas equipes que querem algo que funcione e continue melhorando. Seu feedback define o que construímos a seguir."

