      commission: "comisión en todas las reservas"
    quote: "La reserva en línea ha pasado de ser algo opcional a ser una herramienta crítica. Las empresas sin ella están perdiendo clientes ante competidores que ofrecen la comodidad de auto-agendar 24/7."

