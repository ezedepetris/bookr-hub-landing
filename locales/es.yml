    what_is_booking_system_p1: "Un sistema de reservas es un software que permite a las empresas gestionar citas y reservaciones en línea, 24/7. Según un estudio de 2024 de Capterra, las empresas que usan sistemas de reservas en línea ven una reducción del 40% en inasistencias y ahorran en promedio 10 horas semanales en programación telefónica."
    modern_booking_systems: "Los sistemas de reservas modernos como BookrHub también incluyen funciones como recordatorios automáticos, pagos en línea y páginas personalizadas, eliminando la necesidad de que los clientes llamen o envíen emails para reservar."
    stats:
