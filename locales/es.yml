  faq:
    title: "Preguntas frecuentes"
    subtitle: "Todo lo que necesitas saber sobre BookrHub"
    question1: "¿Cómo funciona el plan gratuito?"
    answer1: "Nuestro plan Independent gratuito es completamente gratis para siempre - no se requiere tarjeta de crédito. Obtienes hasta 150 reservas por mes, recordatorios por email, y una página de reserva en nuestro subdominio. Es perfecto para profesionales independientes que están comenzando."
    question2: "¿Puedo cancelar mi suscripción en cualquier momento?"
    answer2: "¡Sí! Puedes cancelar tu suscripción en cualquier momento sin preguntas. No hay contratos a largo plazo ni tarifas de cancelación. Continuarás teniendo acceso hasta el final de tu período de facturación."
    question3: "¿Ofrecen soluciones personalizadas para equipos más grandes?"
    answer3: "¡Absolutamente! Nuestro plan Business admite miembros del personal ilimitados. Para empresas con necesidades específicas, contáctanos en admin@bookrhub.com y crearemos una solución personalizada para ti."
    question4: "¿Cobran comisión o porcentaje de mis ventas?"
    answer4: "No. No cobramos ninguna comisión ni porcentaje de tus ventas. Conectas tu propia pasarela de pago—soportamos muchas integraciones. El dinero te llega directamente. Configura la que prefieras y quédate con cada euro que ganes."
    question5: "¿Cuánto tiempo toma configurarlo?"
    answer5: "¡La mayoría de los negocios están funcionando en menos de 5 minutos! Solo crea una cuenta, agrega tus servicios y disponibilidad, y comparte tu enlace de reserva. Es así de simple."
    question6: "¿Qué es un sistema de reservas y por qué lo necesito?"
    answer6: "Un sistema de reservas es un software que ayuda a los negocios a gestionar citas, horarios y reservas de clientes en línea. BookrHub es un sistema de reservas completo que automatiza tu agenda, reduce las inasistencias con recordatorios y te ayuda a hacer crecer tu negocio. Nuestro plan gratuito es ideal para empezar sin tarjeta de crédito."
    question7: "¿Es BookrHub una buena alternativa a Fresha, SetMore o GetTimely?"
    answer7: "Sí. BookrHub es un sistema de citas y software de reservas sencillo que hace lo que necesitas sin complicaciones. Si buscas una alternativa a Fresha, SetMore o GetTimely con plan gratis, reservas en tiempo real y recordatorios, BookrHub está pensado para equipos pequeños y profesionales independientes. No se requiere tarjeta de crédito para empezar."
    question8: "¿Obtengo una web o solo un formulario de reservas?"
    answer8: "Obtienes una landing completa que sirve como tu web. Tu página de BookrHub tiene tu marca, tus servicios, tu disponibilidad—no es solo un formulario. Muchos competidores te dan un formulario para incrustar; nosotros te damos una página lista para compartir que parece tu negocio. En planes de pago puedes usar tu propio dominio. Un solo enlace para todo."

