      title: "El mismo poder que los grandes"
      description: "Igualamos lo que Fresha, SetMore y GetTimely ofrecen: reservas en tiempo real, recordatorios, pagos, gestión de equipo. Tienes las funciones que necesitas sin relleno ni precios altos."
    card_landing:
      title: "Tu página de reservas es tu web"
      description: "¿Quién más te da una landing page completa que sirve como tu web? Con BookrHub tu página no es solo un formulario: es una página con tu marca, tus servicios y tu dominio. Un solo enlace para todo."
    card_growth:
      title: "Estamos recién arrancando"
      description: "Esta es nuestra base. Todo lo que sumemos—nuevas funciones, integraciones, herramientas—hace crecer tu plataforma también. No compras un producto cerrado; te subes a una plataforma que va a crecer mucho contigo."
    card_payments:
      title: "Cero comisión. Tu pasarela de pago. El dinero va a ti."
      description: "No cobramos porcentaje ni comisión por tus ventas. Conectas tu propio método de pago—soportamos muchas pasarelas. El dinero te llega directamente. Configura la integración que prefieras y quédate con cada euro que ganes."
    card_underdog:
      title: "Hecho para negocios reales"
      description: "No somos un gigante. Lo construimos para salones, barberos, consultores y equipos pequeños que quieren algo que funcione y siga mejorando. Tu feedback define lo que construimos después."

