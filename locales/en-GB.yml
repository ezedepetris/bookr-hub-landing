  faq:
    title: "Frequently asked questions"
    subtitle: "Everything you need to know about BookrHub"
    question1: "What is a booking system and why do I need one?"
    answer1: "A booking system is software that helps businesses manage appointments, schedules, and customer bookings online. BookrHub is a complete booking system that automates your scheduling, reduces no-shows with reminders, and helps you grow your business. Our free plan is perfect for getting started with no credit card required."
    question2: "How does the free plan work?"
    answer2: "Our free Independent plan is completely free forever - no credit card required. You get up to 150 bookings per month, email reminders, and a booking page on our subdomain. It's perfect for solo professionals getting started with a booking system."
    question3: "Can I cancel my subscription anytime?"
    answer3: "Yes! You can cancel your subscription at any time with no questions asked. There are no long-term contracts or cancellation fees. You'll continue to have access until the end of your billing period."
    question4: "Do you offer custom solutions for larger teams?"
    answer4: "Absolutely! Our Business plan supports unlimited staff members. For enterprises with specific needs, reach out to us at admin@bookrhub.com and we'll create a custom solution for you."
    question5: "Do you take a commission or percentage of my sales?"
    answer5: "No. We don't take any commission or percentage of your sales. You connect your own payment provider—we support many integrations. The money goes directly to you. You set up your preferred provider and keep every dollar you earn."
    question6: "How long does it take to set up?"
    answer6: "Most businesses are up and running in under 5 minutes! Just create an account, add your services and availability, and share your booking link. It's that simple."
    question7: "Is BookrHub a good alternative to Fresha, SetMore, or GetTimely?"
    answer7: "Yes. BookrHub is a simple appointment system and booking software that does what you need without the complexity. If you're looking for a Fresha alternative, SetMore alternative, or GetTimely alternative with a free plan, real-time scheduling, and reminders, BookrHub is built for small teams and solo pros. No credit card required to start."
    question8: "Do I get a website or just a booking form?"
    answer8: "You get a full landing page that serves as your website. Your BookrHub page has your brand, your services, your availability—it's not just a bare booking form. Many competitors give you a form to embed elsewhere; we give you a ready-to-share page that looks like your business. You can use your own domain on paid plans. One link does it all."

