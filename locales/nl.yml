  faq:
    title: "Veelgestelde vragen"
    subtitle: "Alles wat je moet weten over BookrHub"
    question1: "Wat is een boekingssysteem en waarom heb ik er een nodig?"
    answer1: "Een boekingssysteem is software die bedrijven helpt om afspraken, schema's en klantboekingen online te beheren. BookrHub is een compleet boekingssysteem dat je planning automatiseert, no-shows met herinneringen vermindert en je helpt je bedrijf te laten groeien. Ons gratis plan is perfect om te starten zonder creditcard."
    question2: "Hoe werkt het gratis plan?"
    answer2: "Ons gratis Zelfstandig plan is compleet gratis voor altijd - geen creditcard nodig. Je krijgt tot 150 boekingen per maand, e-mail herinneringen en een boekingspagina op ons subdomein. Het is perfect voor solo professionals die beginnen met een boekingssysteem."
    question3: "Kan ik mijn abonnement altijd annuleren?"
    answer3: "Ja! Je kunt je abonnement altijd annuleren zonder vragen. Er zijn geen langetermijncontracten of annuleringkosten. Je behoudt toegang tot het einde van je facturatieperiode."
    question4: "Bieden jullie aangepaste oplossingen voor grotere teams?"
    answer4: "Absoluut! Ons Business plan ondersteunt onbeperkte medewerkers. Voor ondernemingen met specifieke behoeften, neem contact op via admin@bookrhub.com en we maken een aangepaste oplossing voor je."
    question5: "Rekenen jullie commissie of percentage van mijn verkopen?"
    answer5: "Nee. We rekenen geen commissie of percentage van je verkopen. Je verbindt je eigen betaalprovider—we ondersteunen veel integraties. Het geld gaat rechtstreeks naar jou. Stel je favoriete provider in en houd elk euro dat je verdient."
    question6: "Hoe lang duurt de setup?"
    answer6: "De meeste bedrijven zijn binnen 5 minuten up en running! Maak gewoon een account aan, voeg je diensten en beschikbaarheid toe en deel je boekingslink. Zo simpel is het."
    question7: "Is BookrHub een goed alternatief voor Fresha, SetMore of GetTimely?"
    answer7: "Ja. BookrHub is een eenvoudig afsprakensysteem en boekingssoftware dat doet wat je nodig hebt zonder de complexiteit. Als je een Fresha alternatief, SetMore alternatief of GetTimely alternatief zoekt met een gratis plan, real-time planning en herinneringen, is BookrHub gebouwd voor kleine teams en solo pros. Geen creditcard nodig om te starten."
    question8: "Krijg ik een website of alleen een boekingsformulier?"
    answer8: "Je krijgt een complete landingspagina die als je website dient. Je BookrHub pagina heeft je merk, je diensten, je beschikbaarheid—het is niet zomaar een kaal boekingsformulier. Veel concurrenten geven je een formulier om ergens anders in te bedden; wij geven je een kant-en-klare pagina die eruitziet als je bedrijf. Je kunt je eigen domein gebruiken op betaalde plannen. Eén link doet het allemaal."

