    card_landing:
      title: "Je boekingspagina is je website"
      description: "Wie geeft je nog meer een complete landingspagina die als je website dient? Met BookrHub is je boekingspagina geen kaal formulier—het is een merkpagina met je diensten, je stijl en je domein. Eén link doet het allemaal."
    card_growth:
      title: "We zijn nog maar net begonnen"
      description: "Dit is onze basis. Alles wat we hiervandaan verzenden—nieuwe functies, integraties, tools—maakt ook jouw platform groter. Je koopt geen afgerond product; je stapt op een platform dat veel met je mee zal groeien."
    card_payments:
      title: "Zero commissie. Je eigen betaalprovider. Geld gaat naar jou."
      description: "We nemen geen percentage of commissie van je verkopen. Je verbindt je eigen betaalmethode—we ondersteunen veel providers. Het geld gaat rechtstreeks naar jou. Stel je favoriete integratie in en houd elk euro dat je verdient."
    card_underdog:
      title: "Gebouwd voor echte bedrijven"
      description: "We zijn geen reus. We bouwen dit voor salons, kappers, consultants en kleine teams die iets willen dat werkt en steeds beter wordt. Jouw feedback bepaalt wat we hierna bouwen."

